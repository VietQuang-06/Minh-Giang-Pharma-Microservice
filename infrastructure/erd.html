<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERD — Nhà Thuốc Minh Giang</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0f1e;--surface:#111827;--surface2:#1f2937;--border:#2d3748;--text:#e2e8f0;--muted:#8b9ab3}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh;user-select:none}

/* HEADER */
#hdr{height:54px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:100;position:relative;flex-shrink:0}
#logo{font-size:15px;font-weight:800;color:#fff;white-space:nowrap;letter-spacing:-.3px}
#logo span{color:#3b82f6}
.hdiv{width:1px;height:28px;background:var(--border);flex-shrink:0}
#search{background:#0a0f1e;border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;font-size:12px;width:190px;outline:none}
#search:focus{border-color:#3b82f6}
#search::placeholder{color:var(--muted)}
.pill-group{display:flex;gap:6px;align-items:center}
.s-pill{padding:4px 11px;border-radius:20px;border:none;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:.2px;transition:all .2s;color:#fff;background:#1e3a5f}
.s-pill.off{opacity:.28;filter:grayscale(.5)}
.s-pill[data-s=mg_identity]{background:#1d4ed8}
.s-pill[data-s=mg_catalog]{background:#047857}
.s-pill[data-s=mg_order]{background:#b45309}
.s-pill[data-s=mg_cms]{background:#6d28d9}
.s-pill[data-s=mg_notification]{background:#b91c1c}
.hbtn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap}
.hbtn:hover{background:#374151}
.ckbox{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);cursor:pointer;white-space:nowrap}
.ckbox input{accent-color:#3b82f6;cursor:pointer}
#ml{margin-left:auto;display:flex;align-items:center;gap:8px}
#zoom-pct{font-size:11px;color:var(--muted);min-width:38px;text-align:center}

/* CANVAS AREA */
#wrap{position:relative;width:100vw;height:calc(100vh - 54px);overflow:hidden;cursor:grab}
#wrap.panning{cursor:grabbing}
#svg-layer{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
#canvas{position:absolute;transform-origin:0 0}

/* TABLE CARD */
.tc{position:absolute;width:236px;background:var(--surface);border-radius:10px;overflow:hidden;cursor:move;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:box-shadow .15s,opacity .2s}
.tc:hover{box-shadow:0 8px 32px rgba(0,0,0,.7);z-index:5}
.tc.dragging{z-index:999;box-shadow:0 20px 60px rgba(0,0,0,.9);opacity:.95}
.tc.dim{opacity:.1}

/* TABLE HEADER */
.th{padding:8px 10px;display:flex;align-items:center;gap:7px;cursor:pointer}
.th-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.th-schema{font-size:9px;font-weight:600;opacity:.75;letter-spacing:.5px;text-transform:uppercase}
.th-name{font-size:12px;font-weight:800;color:#fff;flex:1;line-height:1.2}
.th-cnt{font-size:10px;color:rgba(255,255,255,.4);background:rgba(255,255,255,.08);padding:1px 5px;border-radius:10px}
.th-arrow{font-size:10px;color:rgba(255,255,255,.3);transition:transform .2s;flex-shrink:0}

/* TABLE BODY */
.tb{border-top:1px solid rgba(255,255,255,.06)}
.tc.coll .tb{display:none}
.tc.coll .th-arrow{transform:rotate(-90deg)}

/* COLUMN ROW */
.cr{display:flex;align-items:center;gap:5px;padding:3px 10px;font-size:10.5px;border-bottom:1px solid rgba(255,255,255,.03)}
.cr:last-child{border-bottom:none;padding-bottom:5px}
.ck{font-size:8.5px;font-weight:700;padding:1px 4px;border-radius:3px;min-width:22px;text-align:center;flex-shrink:0;letter-spacing:.3px}
.ck.pk{background:#f59e0b22;color:#fbbf24;border:1px solid #f59e0b55}
.ck.fk{background:#3b82f622;color:#60a5fa;border:1px solid #3b82f655}
.ck.uk{background:#8b5cf622;color:#a78bfa;border:1px solid #8b5cf655}
.ck.--{background:transparent;border:1px solid transparent;color:transparent}
.cn{color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ct{color:var(--muted);font-size:9.5px;flex-shrink:0}
.ci{color:#ef444477;font-size:8px;flex-shrink:0;margin-left:1px}

/* STATS */
#stats{position:absolute;bottom:14px;left:14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:11px;color:var(--muted);display:flex;gap:14px;z-index:50;pointer-events:none}
.si strong{color:var(--text)}

/* ZOOMBTN */
#zbtns{position:absolute;bottom:14px;right:14px;display:flex;gap:4px;z-index:50}
.zbtn{width:30px;height:30px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.zbtn:hover{background:var(--surface2)}

/* TOOLTIP */
#tip{position:fixed;background:#1e293b;border:1px solid #475569;border-radius:6px;padding:5px 9px;font-size:10px;color:#e2e8f0;pointer-events:none;z-index:9999;display:none;line-height:1.5}

/* TABLE HOVER HIGHLIGHT */
.tc.hi{z-index:10;box-shadow:0 0 0 2px #3b82f6,0 8px 32px rgba(59,130,246,.3)!important}
.tc.lo{opacity:.2}

/* MINI LEGEND */
#leg{position:absolute;top:12px;right:14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:10px;color:var(--muted);z-index:50;line-height:2}
#leg li{display:flex;align-items:center;gap:6px;list-style:none}
.lline{width:24px;height:1.5px;flex-shrink:0}
</style>
</head>
<body>

<div id="hdr">
  <div id="logo">Nhà Thuốc <span>Minh Giang</span> · ERD</div>
  <div class="hdiv"></div>
  <input id="search" type="search" placeholder="🔍  Tìm bảng / cột...">
  <div class="hdiv"></div>
  <div class="pill-group">
    <span style="font-size:11px;color:var(--muted)">Schema:</span>
    <button class="s-pill" data-s="mg_identity">identity</button>
    <button class="s-pill" data-s="mg_catalog">catalog</button>
    <button class="s-pill" data-s="mg_order">order</button>
    <button class="s-pill" data-s="mg_cms">cms</button>
    <button class="s-pill" data-s="mg_notification">notification</button>
  </div>
  <div class="hdiv"></div>
  <label class="ckbox"><input type="checkbox" id="ck-cross" checked>Cross-schema FK</label>
  <label class="ckbox" style="margin-left:4px"><input type="checkbox" id="ck-fk" checked>Tất cả FK</label>
  <div id="ml">
    <button class="hbtn" onclick="collapseAll()">Thu gọn tất cả</button>
    <button class="hbtn" onclick="expandAll()">Mở rộng tất cả</button>
    <button class="hbtn" onclick="fitScreen()">⛶ Fit screen</button>
    <div class="hdiv"></div>
    <span id="zoom-pct">100%</span>
  </div>
</div>

<div id="wrap">
  <svg id="svg-layer"></svg>
  <div id="canvas"></div>
</div>

<div id="stats">
  <div class="si"><strong id="st-schemas">5</strong> schemas</div>
  <div class="si"><strong id="st-tables">45</strong> bảng</div>
  <div class="si"><strong id="st-cols">0</strong> cột</div>
  <div class="si"><strong id="st-fks">0</strong> FK</div>
</div>

<div id="zbtns">
  <button class="zbtn" onclick="zoom(1.2)" title="Zoom in">+</button>
  <button class="zbtn" onclick="zoom(0.8)" title="Zoom out">−</button>
</div>

<ul id="leg">

  <li><svg width="24" height="3"><line x1="0" y1="1.5" x2="24" y2="1.5" stroke="#10b981" stroke-width="2"/></svg>catalog FK</li>
  <li><svg width="24" height="3"><line x1="0" y1="1.5" x2="24" y2="1.5" stroke="#f59e0b" stroke-width="2"/></svg>order FK</li>
  <li><svg width="24" height="3"><line x1="0" y1="1.5" x2="24" y2="1.5" stroke="#a78bfa" stroke-width="2"/></svg>cms FK</li>
  <li><svg width="24" height="3"><line x1="0" y1="1.5" x2="24" y2="1.5" stroke="#f87171" stroke-width="2"/></svg>notification FK</li>
  <li><svg width="24" height="3"><line x1="0" y1="1.5" x2="24" y2="1.5" stroke="#fb923c" stroke-width="2" stroke-dasharray="6,3"/></svg>cross-schema FK</li>
  <li><span class="ck pk" style="min-width:auto">PK</span> Primary Key</li>
  <li><span class="ck fk" style="min-width:auto">FK</span> Foreign Key</li>
  <li><span class="ck uk" style="min-width:auto">UK</span> Unique Key</li>

<div id="tip"></div>

// STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let positions = {}; // table id → {x,y}
let collapsed = {};
let scale = 0.72, tx = 40, ty = 24;
let hiddenSchemas = new Set();
let showCross = true, showFks = true;
let dragging = null, dragOffX = 0, dragOffY = 0;
let panning = false, panX0 = 0, panY0 = 0, panTx0 = 0, panTy0 = 0;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// RENDER TABLES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function init() {
  // init positions from table data
  TABLES.forEach(t => { positions[t.id] = {x:t.x, y:t.y}; });
  renderAll();
  applyTransform();
  updateStats();
}

function renderAll() {
  const canvas = document.getElementById('canvas');
  canvas.innerHTML = '';
  TABLES.forEach(t => renderTable(t, canvas));
  renderFKLines();
}

function renderTable(t, canvas) {
  const sc = SC[t.s];
  const pos = positions[t.id];
  const isColl = collapsed[t.id];
  const el = document.createElement('div');
  el.className = 'tc' + (isColl ? ' coll' : '');
  el.id = 'tc_' + t.id;
  el.style.cssText = `left:${pos.x}px;top:${pos.y}px;border-top:2px solid ${sc.hdr};`;
  el.style.background = sc.bg;

  const shortName = t.id.split('.')[1];
  const schemaLabel = t.s.replace('mg_','');

  el.innerHTML = `
    <div class="th" style="background:${sc.hdr}22" onclick="toggleCollapse('${t.id}')">
      <div class="th-dot" style="background:${sc.dot}"></div>
      <div>
        <div class="th-schema">${schemaLabel}</div>
        <div class="th-name">${shortName}</div>
      </div>
      <div class="th-cnt">${t.cols.length}</div>
      <div class="th-arrow">▾</div>
    </div>
    <div class="tb">${t.cols.map(c => `
      <div class="cr">
        <span class="ck ${c[1].toLowerCase().replace('--','--')}">${c[1]==='--'?'&nbsp;':c[1]}</span>
        <span class="cn" title="${c[0]}">${c[0]}</span>
        <span class="ct">${c[2]}</span>
      </div>`).join('')}
    </div>`;

  // drag
  el.addEventListener('mousedown', e => {
    if (e.target.closest('.th')) return; // let header toggle
    startDrag(e, t.id);
  });
  el.querySelector('.th').addEventListener('mousedown', e => e.stopPropagation());
  el.querySelector('.th').addEventListener('click', e => e.stopPropagation());

  canvas.appendChild(el);

  // Hover: highlight connected tables & FK lines
  el.addEventListener('mouseenter', () => onTableMouseEnter(t.id));
  el.addEventListener('mouseleave', onTableMouseLeave);
}

function toggleCollapse(id) {
  collapsed[id] = !collapsed[id];
  const el = document.getElementById('tc_' + id);
  if (el) {
    el.classList.toggle('coll', collapsed[id]);
  }
  setTimeout(renderFKLines, 50);
}
function collapseAll() { TABLES.forEach(t => { collapsed[t.id]=true; document.getElementById('tc_'+t.id)?.classList.add('coll'); }); renderFKLines(); }
function expandAll() { TABLES.forEach(t => { collapsed[t.id]=false; document.getElementById('tc_'+t.id)?.classList.remove('coll'); }); renderFKLines(); }

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// FK LINES — Smart orthogonal routing
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function getTableRect(id) {
  const el = document.getElementById('tc_' + id);
  if (!el) return null;
  const pos = positions[id];
  return { x: pos.x, y: pos.y, w: 236, h: el.offsetHeight };
}

// Pick the best exit/entry ports (4 sides) based on relative positions
function bestPorts(fr, tr) {
  const fcx = fr.x + fr.w/2, fcy = fr.y + fr.h/2;
  const tcx = tr.x + tr.w/2, tcy = tr.y + tr.h/2;
  const dx = tcx - fcx, dy = tcy - fcy;

  // Overlap detection
  const xOverlap = Math.abs(dx) < (fr.w + tr.w) / 2 + 10;
  const yOverlap = Math.abs(dy) < (fr.h + tr.h) / 2 + 10;

  let x1, y1, sx1, sy1, x2, y2, sx2, sy2;
  const GAP = 28; // control point distance

  if (!xOverlap && Math.abs(dx) >= Math.abs(dy)) {
    // Primary: left ↔ right
    if (dx > 0) {
      x1 = fr.x + fr.w; y1 = fcy; sx1 = GAP; sy1 = 0;
      x2 = tr.x;        y2 = tcy; sx2 = -GAP; sy2 = 0;
    } else {
      x1 = fr.x;        y1 = fcy; sx1 = -GAP; sy1 = 0;
      x2 = tr.x + tr.w; y2 = tcy; sx2 = GAP;  sy2 = 0;
    }
  } else if (!yOverlap) {
    // Primary: top ↔ bottom
    if (dy > 0) {
      x1 = fcx; y1 = fr.y + fr.h; sx1 = 0; sy1 = GAP;
      x2 = tcx; y2 = tr.y;        sx2 = 0; sy2 = -GAP;
    } else {
      x1 = fcx; y1 = fr.y;        sx1 = 0; sy1 = -GAP;
      x2 = tcx; y2 = tr.y + tr.h; sx2 = 0; sy2 = GAP;
    }
  } else {
    // Fallback: nearest corner combo
    if (dx > 0) {
      x1 = fr.x + fr.w; y1 = fcy; sx1 = GAP; sy1 = 0;
      x2 = tr.x;        y2 = tcy; sx2 = -GAP; sy2 = 0;
    } else {
      x1 = fr.x;        y1 = fcy; sx1 = -GAP; sy1 = 0;
      x2 = tr.x + tr.w; y2 = tcy; sx2 = GAP;  sy2 = 0;
    }
  }
  return { x1, y1, sx1, sy1, x2, y2, sx2, sy2 };
}

// Build a smooth orthogonal path with rounded elbows
function buildPath(x1, y1, sx1, sy1, x2, y2, sx2, sy2) {
  const hExit  = (sx1 !== 0);
  const hEntry = (sx2 !== 0);

  if (hExit && hEntry) {
    const midX = (x1 + x2) / 2;
    return `M${x1},${y1} L${midX},${y1} L${midX},${y2} L${x2},${y2}`;
  } else if (!hExit && !hEntry) {
    const midY = (y1 + y2) / 2;
    return `M${x1},${y1} L${x1},${midY} L${x2},${midY} L${x2},${y2}`;
  } else {
    // One horizontal, one vertical
    if (hExit) {
      return `M${x1},${y1} L${x2},${y1} L${x2},${y2}`;
    } else {
      return `M${x1},${y1} L${x1},${y2} L${x2},${y2}`;
    }
  }
}

// Schema-based line colour for within-schema FKs
const LINE_COLOR = {
  mg_identity:     '#3b82f6',
  mg_catalog:      '#10b981',
  mg_order:        '#f59e0b',
  mg_cms:          '#a78bfa',
  mg_notification: '#f87171',
};

let activeTable = null; // for hover-dim effect

function renderFKLines() {
  const svg = document.getElementById('svg-layer');

  // Build marker defs for each colour
  const colors = Object.values(LINE_COLOR);
  const crossColor = '#fb923c';
  const allColors = [...colors, crossColor];

  let defsHtml = '<defs>';
  allColors.forEach((col, i) => {
    defsHtml += `<marker id="arr${i}" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0.5 L0,6.5 L6,3.5 z" fill="${col}"/>
    </marker>`;
    defsHtml += `<marker id="arrd${i}" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0.5 L0,6.5 L6,3.5 z" fill="${col}" opacity="0.7"/>
    </marker>`;
    // Wider invisible hit-area marker
    defsHtml += `<filter id="glow${i}" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>`;
  });
  defsHtml += '</defs>';
  svg.innerHTML = defsHtml;

  if (!showFks) return;

  // Group: render same-schema FKs first (below), cross-schema on top
  const ordered = [...FKS].sort((a, b) => (a[4] ? 1 : 0) - (b[4] ? 1 : 0));

  ordered.forEach(([from, fromCol, to, toCol, cross]) => {
    if (!showCross && cross) return;
    const fromS = from.split('.')[0];
    const toS   = to.split('.')[0];
    if (hiddenSchemas.has(fromS) || hiddenSchemas.has(toS)) return;

    const fr = getTableRect(from);
    const tr = getTableRect(to);
    if (!fr || !tr) return;

    const { x1, y1, sx1, sy1, x2, y2, sx2, sy2 } = bestPorts(fr, tr);
    const d = buildPath(x1, y1, sx1, sy1, x2, y2, sx2, sy2);

    // Choose colour: cross-schema = orange, within = schema colour
    const baseColor = cross ? crossColor : (LINE_COLOR[fromS] || '#64748b');
    const colorIdx  = cross ? allColors.length - 1 : colors.indexOf(LINE_COLOR[fromS]);

    const isDimmed = activeTable && from !== activeTable && to !== activeTable;
    const isBright = activeTable && (from === activeTable || to === activeTable);

    const opacity = isDimmed ? 0.04 : (isBright ? 1 : (cross ? 0.38 : 0.45));
    const sw      = isBright ? 2.5 : 1.5;
    const markerSuffix = cross ? 'd' + colorIdx : '' + colorIdx;

    // Hit-area path (invisible, wide)
    const hitEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    hitEl.setAttribute('d', d);
    hitEl.setAttribute('stroke', 'transparent');
    hitEl.setAttribute('stroke-width', '12');
    hitEl.setAttribute('fill', 'none');
    hitEl.style.cursor = 'pointer';
    hitEl.style.pointerEvents = 'stroke';
    const lbl = `${from.split('.')[1]}.${fromCol}  →  ${to.split('.')[1]}.${toCol}${cross ? '  (cross-schema)' : ''}`;
    hitEl.addEventListener('mouseenter', e => { showTip(e, lbl); });
    hitEl.addEventListener('mouseleave', hideTip);

    // Visual path
    const pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    pathEl.setAttribute('d', d);
    pathEl.setAttribute('stroke', baseColor);
    pathEl.setAttribute('stroke-width', sw);
    pathEl.setAttribute('fill', 'none');
    pathEl.setAttribute('opacity', opacity);
    if (cross) pathEl.setAttribute('stroke-dasharray', '7,4');
    pathEl.setAttribute('marker-end', `url(#arr${colorIdx})`);
    pathEl.style.pointerEvents = 'none';
    pathEl.style.transition = 'opacity 0.2s';

    svg.appendChild(pathEl);
    svg.appendChild(hitEl);
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// TABLE HOVER → dim unrelated lines & tables
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function getRelatedTables(tableId) {
  const related = new Set([tableId]);
  FKS.forEach(([from, , to]) => {
    if (from === tableId) related.add(to);
    if (to === tableId)   related.add(from);
  });
  return related;
}

function onTableMouseEnter(tableId) {
  activeTable = tableId;
  const related = getRelatedTables(tableId);
  TABLES.forEach(t => {
    const el = document.getElementById('tc_' + t.id);
    if (!el || hiddenSchemas.has(t.s)) return;
    if (related.has(t.id))   { el.classList.add('hi');  el.classList.remove('lo'); }
    else                      { el.classList.add('lo');  el.classList.remove('hi'); }
  });
  renderFKLines();
}

function onTableMouseLeave() {
  activeTable = null;
  TABLES.forEach(t => {
    const el = document.getElementById('tc_' + t.id);
    if (el) { el.classList.remove('hi', 'lo'); }
  });
  renderFKLines();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// TRANSFORM (pan + zoom)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function applyTransform() {
  const canvas = document.getElementById('canvas');
  const svg    = document.getElementById('svg-layer');
  canvas.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  // SVG must be kept in sync
  const vw = window.innerWidth, vh = window.innerHeight - 54;
  // make SVG huge enough
  const cw = 3200, ch = 1500;
  svg.setAttribute('width',  vw);
  svg.setAttribute('height', vh);
  svg.setAttribute('viewBox', `${-tx/scale} ${-ty/scale} ${vw/scale} ${vh/scale}`);
  document.getElementById('zoom-pct').textContent = Math.round(scale*100)+'%';
}

function zoom(factor) {
  const vw = window.innerWidth/2, vh = (window.innerHeight-54)/2;
  tx = vw - factor*(vw - tx);
  ty = vh - factor*(vh - ty);
  scale *= factor;
  scale = Math.max(0.15, Math.min(3, scale));
  applyTransform();
}

function fitScreen() {
  // compute bounding box of all tables
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  TABLES.forEach(t => {
    const p = positions[t.id];
    const el = document.getElementById('tc_'+t.id);
    const h = el ? el.offsetHeight : 200;
    if (hiddenSchemas.has(t.s)) return;
    minX=Math.min(minX,p.x); minY=Math.min(minY,p.y);
    maxX=Math.max(maxX,p.x+236); maxY=Math.max(maxY,p.y+h);
  });
  const vw = window.innerWidth - 280; // leave room for legend
  const vh = window.innerHeight - 54 - 60;
  const contentW = maxX - minX + 40;
  const contentH = maxY - minY + 40;
  scale = Math.min(vw/contentW, vh/contentH, 1.2);
  scale = Math.max(0.15, scale);
  tx = -minX*scale + 20;
  ty = -minY*scale + 20;
  applyTransform();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DRAG TABLES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function startDrag(e, id) {
  e.stopPropagation();
  dragging = id;
  const pos = positions[id];
  dragOffX = e.clientX/scale - pos.x - tx/scale;
  dragOffY = e.clientY/scale - pos.y - ty/scale;
  document.getElementById('tc_'+id)?.classList.add('dragging');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SEARCH
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  TABLES.forEach(t => {
    const el = document.getElementById('tc_'+t.id);
    if (!el) return;
    if (!q) { el.classList.remove('dim'); return; }
    const tName = t.id.toLowerCase();
    const hasMatch = tName.includes(q) || t.cols.some(c => c[0].toLowerCase().includes(q));
    el.classList.toggle('dim', !hasMatch);
  });
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SCHEMA PILLS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
document.querySelectorAll('.s-pill').forEach(btn => {
  btn.addEventListener('click', () => {
    const s = btn.dataset.s;
    if (hiddenSchemas.has(s)) { hiddenSchemas.delete(s); btn.classList.remove('off'); }
    else { hiddenSchemas.add(s); btn.classList.add('off'); }
    TABLES.forEach(t => {
      const el = document.getElementById('tc_'+t.id);
      if (!el) return;
      el.style.display = hiddenSchemas.has(t.s) ? 'none' : '';
    });
    renderFKLines();
  });
});

// cross-schema FK toggle
document.getElementById('ck-cross').addEventListener('change', function() {
  showCross = this.checked; renderFKLines();
});
document.getElementById('ck-fk').addEventListener('change', function() {
  showFks = this.checked; renderFKLines();
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MOUSE EVENTS — Global
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const wrap = document.getElementById('wrap');

wrap.addEventListener('mousedown', e => {
  if (e.target.closest('.tc')) return;
  panning = true;
  panX0 = e.clientX; panY0 = e.clientY;
  panTx0 = tx; panTy0 = ty;
  wrap.classList.add('panning');
});

document.addEventListener('mousemove', e => {
  if (dragging) {
    const pos = positions[dragging];
    pos.x = e.clientX/scale - dragOffX - tx/scale;
    pos.y = e.clientY/scale - dragOffY - ty/scale;
    const el = document.getElementById('tc_'+dragging);
    if (el) { el.style.left = pos.x+'px'; el.style.top = pos.y+'px'; }
    renderFKLines();
  } else if (panning) {
    tx = panTx0 + (e.clientX - panX0);
    ty = panTy0 + (e.clientY - panY0);
    applyTransform();
    renderFKLines();
  }
});

document.addEventListener('mouseup', e => {
  if (dragging) {
    document.getElementById('tc_'+dragging)?.classList.remove('dragging');
    dragging = null;
  }
  if (panning) { panning = false; wrap.classList.remove('panning'); }
});

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const mx = e.clientX, my = e.clientY - 54;
  tx = mx - factor*(mx - tx);
  ty = my - factor*(my - ty);
  scale *= factor;
  scale = Math.max(0.1, Math.min(3, scale));
  applyTransform();
  renderFKLines();
}, { passive: false });

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// TOOLTIP
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const tip = document.getElementById('tip');
function showTip(e, text) {
  tip.textContent = text;
  tip.style.display = 'block';
  tip.style.left = (e.clientX + 12)+'px';
  tip.style.top  = (e.clientY + 12)+'px';
}
function hideTip() { tip.style.display = 'none'; }

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// STATS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function updateStats() {
  const totalCols = TABLES.reduce((a,t)=>a+t.cols.length,0);
  document.getElementById('st-tables').textContent = TABLES.length;
  document.getElementById('st-cols').textContent = totalCols;
  document.getElementById('st-fks').textContent = FKS.length;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// KEYBOARD
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
document.addEventListener('keydown', e => {
  if (e.key==='f' || e.key==='F') fitScreen();
  if (e.key==='+' || e.key==='=') zoom(1.15);
  if (e.key==='-') zoom(0.85);
  if (e.key==='0') { scale=1; tx=40; ty=24; applyTransform(); renderFKLines(); }
  if (e.key==='Escape') { expandAll(); document.getElementById('search').value=''; TABLES.forEach(t=>document.getElementById('tc_'+t.id)?.classList.remove('dim')); }
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// BOOT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
init();
// After DOM settles, fit screen
setTimeout(()=>{ fitScreen(); renderFKLines(); }, 150);
</script>
</body>
</html>
