<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tin tức y tế & Sự kiện — Nhà Thuốc Minh Giang</title>
    <meta name="description" content="Cập nhật tin tức y tế mới nhất, các hoạt động sự kiện nổi bật và chương trình hoạt động cộng đồng của Nhà Thuốc Minh Giang.">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        
        /* Hero Search Banner */
        .news-hero {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #2563eb 100%);
            padding: 28px 0;
            margin-bottom: 24px;
        }

        .news-hero .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }

        .news-hero-title {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
        }

        .news-search-box {
            flex: 1;
            max-width: 500px;
            display: flex;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .15);
        }

        .news-search-box input {
            flex: 1;
            border: none;
            padding: 12px 16px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            color: #333;
        }

        .news-search-box input::placeholder {
            color: #9ca3af;
        }

        .news-search-box button {
            width: 48px;
            border: none;
            background: #1e3a8a;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: background .15s;
        }

        .news-search-box button:hover {
            background: #172554;
        }

        /* Layout */
        .page-layout-custom {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 30px;
            margin-bottom: 40px;
        }

        .article-card-main {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            text-decoration: none;
            color: inherit;
        }

        .article-card-main:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.12);
        }

        .article-card-main img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: #f3f4f6;
        }

        .article-card-content {
            padding: 16px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .article-category {
            font-size: 11px;
            color: #2563eb;
            background: #eff6ff;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 10px;
            width: fit-content;
            font-weight: 700;
        }

        .article-card-main h3 {
            font-size: 15px;
            font-weight: 700;
            color: #111827;
            margin: 0 0 8px 0;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .article-card-main p {
            font-size: 13px;
            color: #4b5563;
            line-height: 1.5;
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .main-articles-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            min-height: 200px;
        }

        .section-header-custom {
            font-size: 18px;
            font-weight: 700;
            color: #374151;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e5e7eb;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .featured-news-sidebar {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            align-self: start;
        }

        .tin-noi-bat-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 100px;
        }

        .tin-noi-bat-card {
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-decoration: none;
            color: inherit;
            transition: opacity 0.2s ease;
        }

        .tin-noi-bat-card:hover {
            opacity: 0.85;
        }

        .tin-noi-bat-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 6px;
            background: #f3f4f6;
        }

        .tin-noi-bat-card h4 {
            font-size: 13px;
            font-weight: 700;
            color: #111827;
            margin: 0;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 15px; }

        .breadcrumb { padding: 14px 0; font-size: 14px; color: #6b7280; }
        .breadcrumb a { color: #2563eb; text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb span { margin: 0 6px; color: #9ca3af; }

        @keyframes skeleton-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .skeleton-card { animation: skeleton-pulse 1.5s infinite; }

        @media (max-width: 992px) {
            .page-layout-custom { grid-template-columns: 1fr; }
            .main-articles-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 576px) {
            .main-articles-grid { grid-template-columns: 1fr; }
            .news-hero .container { flex-direction: column; align-items: stretch; text-align: center; }
            .news-search-box { max-width: none; }
        }
    </style>
</head>

<body>

    <!-- Header Banner -->
    <div mg-include="../components/header_banner.html"></div>

    <!-- Top Bar -->
    <div mg-include="../components/top_bar.html"></div>

    <!-- Main Header -->
    <div mg-include="../components/main_header.html"></div>

    <!-- Blue Hero Search Bar -->
    <div class="news-hero">
        <div class="container">
            <div class="news-hero-title"><i class="fa-solid fa-newspaper"></i> Tin tức & Sự kiện nổi bật</div>
            <div class="news-search-box">
                <input type="text" placeholder="Tìm kiếm tin tức y tế..." id="cmsSearch">
                <button onclick="triggerCmsSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </div>
    </div>

    <!-- Content -->
    <main class="container" data-cms-type="news">
        <!-- Breadcrumb -->
        <div class="breadcrumb">
            <a href="index.html">Trang chủ</a><span>›</span>
            <strong style="color:#2563eb">Tin tức</strong>
        </div>

        <div class="page-layout-custom">
            <!-- Left: Articles Grid -->
            <div>
                <!-- Section Title -->
                <h2 class="section-header-custom" id="listHeader">TIN TỨC MỚI NHẤT</h2>

                <!-- Articles Grid -->
                <div class="main-articles-grid" id="articlesGrid">
                    <!-- Loaded dynamically via cms-portal-loader.js -->
                </div>
            </div>

            <!-- Right Sidebar: Featured articles -->
            <aside class="featured-news-sidebar">
                <h2 class="section-header-custom" style="font-size: 15px; border-bottom-color: #f3f4f6;">TIN TỨC NỔI BẬT</h2>
                <div class="tin-noi-bat-list" id="featuredList">
                    <!-- Loaded dynamically via cms-portal-loader.js -->
                </div>
            </aside>
        </div>

        <!-- Bottom segments -->
        <div class="bottom-sections">
            <div mg-include="../components/disease_groups.html"></div>
            <div mg-include="../components/top_searches.html"></div>
            <div mg-include="../components/featured_products.html"></div>
        </div>
    </main>

    <!-- Pre-Footer Promises -->
    <div mg-include="../components/promises.html"></div>

    <!-- Newsletter -->
    <div mg-include="../components/newsletter.html"></div>

    <!-- Main Footer -->
    <div mg-include="../components/main_footer.html"></div>

    <script src="../assets/js/dropdown-handler.js"></script>
    <script src="../assets/js/mega-menu-loader.js"></script>
    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/client-api.js"></script>
    <script src="../assets/js/cms-portal-loader.js"></script>
</body>

</html>
