<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ Admin — Nhà Thuốc Minh Giang</title>
    <link rel="stylesheet" href="css/admin-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- ============ SIDEBAR ============ -->
    <aside class="admin-sidebar">
        <!-- Inject via admin-components.js -->
    </aside>

    <!-- ============ HEADER ============ -->
    <header class="admin-header">
        <!-- Inject via admin-components.js -->
    </header>

    <!-- ============ MAIN CONTENT ============ -->
    <main class="admin-main">

        <!-- Page Header -->
        <div class="page-header">
            <div>
                <h1 class="page-title">Trang Chủ</h1>
                <p class="page-subtitle" id="dashboardSubtitle">Tổng quan hoạt động kinh doanh — <span id="todayDate">...</span></p>
            </div>
            <div class="page-actions">
                <button class="btn-secondary">
                    <i class="fa-solid fa-download"></i> Xuất báo cáo
                </button>
                <button class="btn-primary" onclick="location.href='batches.html?action=new'">
                    <i class="fa-solid fa-plus"></i> Nhập hàng mới
                </button>
            </div>
        </div>

        <!-- ======== SUMMARY CARDS ======== -->
        <div class="summary-cards">

            <!-- Card 1: Revenue -->
            <div class="summary-card">
                <div class="summary-card-top">
                    <span class="summary-card-label">Doanh thu hôm nay</span>
                    <div class="summary-card-icon green">
                        <i class="fa-solid fa-chart-line"></i>
                    </div>
                </div>
                <div class="summary-card-value" id="statRevenue">
                    <i class="fa-solid fa-circle-notch fa-spin" style="font-size:18px;color:#d1d5db;"></i>
                </div>
                <span class="summary-card-trend" id="statRevenueTrend">—</span>
            </div>

            <!-- Card 2: POS Orders -->
            <div class="summary-card">
                <div class="summary-card-top">
                    <span class="summary-card-label">Đơn POS (Kiosk)</span>
                    <div class="summary-card-icon blue">
                        <i class="fa-solid fa-cash-register"></i>
                    </div>
                </div>
                <div class="summary-card-value" id="statPosOrders">
                    <i class="fa-solid fa-circle-notch fa-spin" style="font-size:18px;color:#d1d5db;"></i>
                </div>
                <span class="summary-card-trend" id="statPosOrdersTrend">—</span>
            </div>

            <!-- Card 3: Web Orders -->
            <div class="summary-card">
                <div class="summary-card-top">
                    <span class="summary-card-label">Đơn Web Online</span>
                    <div class="summary-card-icon purple">
                        <i class="fa-solid fa-globe"></i>
                    </div>
                </div>
                <div class="summary-card-value" id="statWebOrders">
                    <i class="fa-solid fa-circle-notch fa-spin" style="font-size:18px;color:#d1d5db;"></i>
                </div>
                <span class="summary-card-trend" id="statWebOrdersTrend">—</span>
            </div>

            <!-- Card 4: Low Stock Alert -->
            <div class="summary-card">
                <div class="summary-card-top">
                    <span class="summary-card-label">Sản phẩm sắp hết</span>
                    <div class="summary-card-icon orange">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                    </div>
                </div>
                <div class="summary-card-value" id="statLowStock">
                    <i class="fa-solid fa-circle-notch fa-spin" style="font-size:18px;color:#d1d5db;"></i>
                </div>
                <span class="summary-card-trend" id="statLowStockLabel">sản phẩm cần nhập thêm</span>
            </div>

        </div>

        <!-- ======== REVENUE CHART ======== -->
        <div class="chart-card">
            <div class="chart-header">
                <h3 class="chart-title"><i class="fa-solid fa-chart-column"
                        style="color:#10b981;margin-right:8px;"></i>Biểu đồ doanh thu 7 ngày gần nhất</h3>
                <div class="chart-filters">
                    <button class="chart-filter-btn active" onclick="loadRevenueChart(7, this)">7 ngày</button>
                    <button class="chart-filter-btn" onclick="loadRevenueChart(30, this)">30 ngày</button>
                </div>
            </div>
            <div class="chart-placeholder">
                <div class="chart-bars" id="revenueChartBars">
                    <!-- Skeleton bars -->
                    <div class="chart-bar" style="height:60px;background:#e5e7eb;border-radius:6px 6px 0 0;"></div>
                    <div class="chart-bar" style="height:80px;background:#e5e7eb;border-radius:6px 6px 0 0;"></div>
                    <div class="chart-bar" style="height:50px;background:#e5e7eb;border-radius:6px 6px 0 0;"></div>
                    <div class="chart-bar" style="height:100px;background:#e5e7eb;border-radius:6px 6px 0 0;"></div>
                    <div class="chart-bar" style="height:70px;background:#e5e7eb;border-radius:6px 6px 0 0;"></div>
                    <div class="chart-bar" style="height:90px;background:#e5e7eb;border-radius:6px 6px 0 0;"></div>
                    <div class="chart-bar" style="height:75px;background:#e5e7eb;border-radius:6px 6px 0 0;"></div>
                </div>
            </div>
        </div>

        <!-- ======== ALERT TABLES ======== -->
        <div class="alerts-grid">

            <!-- Low Stock Alerts -->
            <div class="alert-card">
                <div class="alert-card-header">
                    <span class="alert-card-title">
                        <span class="alert-dot danger"></span>
                        Cảnh báo sắp hết hàng
                    </span>
                    <span class="alert-count danger" id="lowStockCount">—</span>
                </div>
                <table class="alert-table">
                    <thead>
                        <tr>
                            <th>Tên thuốc</th>
                            <th>SKU</th>
                            <th>Tồn kho</th>
                        </tr>
                    </thead>
                    <tbody id="lowStockTableBody">
                        <tr><td colspan="3" style="text-align:center;padding:20px;color:#9ca3af;">
                            <i class="fa-solid fa-circle-notch fa-spin"></i> Đang tải...
                        </td></tr>
                    </tbody>
                </table>
            </div>

            <!-- Expiring Soon -->
            <div class="alert-card">
                <div class="alert-card-header">
                    <span class="alert-card-title">
                        <span class="alert-dot warning"></span>
                        Thuốc sắp hết hạn
                    </span>
                    <span class="alert-count warning" id="expiringCount">—</span>
                </div>
                <table class="alert-table">
                    <thead>
                        <tr>
                            <th>Tên thuốc</th>
                            <th>Mã lô</th>
                            <th>Hạn sử dụng</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="expiringTableBody">
                        <tr><td colspan="4" style="text-align:center;padding:20px;color:#9ca3af;">
                            <i class="fa-solid fa-circle-notch fa-spin"></i> Đang tải...
                        </td></tr>
                    </tbody>
                </table>
            </div>

        </div>

    </main>

    <!-- ============ SCRIPTS ============ -->
    <script>
        // Hiện ngày hôm nay
        var todayEl = document.getElementById('todayDate');
        if (todayEl) {
            todayEl.textContent = 'Hôm nay, ' + new Date().toLocaleDateString('vi-VN', {
                day: '2-digit', month: '2-digit', year: 'numeric'
            });
        }

        // Chart filter toggle
        function loadRevenueChart(days, btn) {
            document.querySelectorAll('.chart-filter-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            // Re-trigger chart load if admin-loader exposes it
            if (window.loadAdminRevenueChart) window.loadAdminRevenueChart(days);
        }

        // Animate summary cards on load
        document.querySelectorAll('.summary-card').forEach((card, idx) => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(16px)';
            card.style.transition = 'all 0.4s ease';
            setTimeout(() => {
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100 + idx * 80);
        });
    </script>

    <!-- Shared Layout Components -->
    <script src="js/admin-components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderAdminLayout('dashboard');
        });
    </script>
    <script src="js/admin-loader.js"></script>

</body>

</html>
