version: '3.8'

services:
  # ─────────────────────────── Infrastructure ───────────────────────────
  mysql-db:
    image: mysql:8.0
    container_name: minhgiang_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: minhgiang_db
      MYSQL_ROOT_HOST: '%'
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - db-data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 10s
      retries: 15

  rabbitmq:
    image: rabbitmq:3-management
    container_name: minhgiang_rabbitmq
    ports:
      - "127.0.0.1:5672:5672"    # AMQP (code kết nối)
      - "127.0.0.1:15672:15672"  # Management UI: http://localhost:15672  (guest/guest)

    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped

  redis-db:
    image: redis:7.2-alpine
    container_name: minhgiang_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────── Microservices ────────────────────────────
  identity-service:
    build: ./backend/identity-service
    container_name: minhgiang_identity
    environment:
      PORT: 8001
      NODE_ENV: development
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: root
      DB_NAME: mg_identity
      JWT_SECRET: ${JWT_SECRET:-23668e27c1340b01c3de8ff3ad40a5a0}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      CUSTOMER_ACCESS_TOKEN_TTL: ${CUSTOMER_ACCESS_TOKEN_TTL:-2h}
      CUSTOMER_REFRESH_TOKEN_TTL: ${CUSTOMER_REFRESH_TOKEN_TTL:-14d}
      ADMIN_ACCESS_TOKEN_TTL: ${ADMIN_ACCESS_TOKEN_TTL:-2h}
      ADMIN_REFRESH_TOKEN_TTL: ${ADMIN_REFRESH_TOKEN_TTL:-1d}
      POS_ACCESS_TOKEN_TTL: ${POS_ACCESS_TOKEN_TTL:-8h}
      POS_REFRESH_TOKEN_TTL: ${POS_REFRESH_TOKEN_TTL:-12h}
      NOTIFICATION_SERVICE_URL: http://notification-service:8005
      NOTIFICATION_REQUIRED: "true"
      OTP_DEBUG_RESPONSE: ${OTP_DEBUG_RESPONSE:-false}
      GATEWAY_INTERNAL_TOKEN: ${GATEWAY_INTERNAL_TOKEN:-_nQKkw93nTQdu4ZiCEOy8eg_UJmHd0CfbCJ2thy4hx4}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-xazQ9fTOSl_oSBtJHqwDm93f0AwrPkRZ4neR_S6R_2M}
    volumes:
      - ./backend/identity-service:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      mysql-db:
        condition: service_healthy
    restart: unless-stopped

  catalog-service:
    build: ./backend/catalog-service
    container_name: minhgiang_catalog
    environment:
      PORT: 8002
      NODE_ENV: development
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: root
      DB_NAME: mg_catalog
      REDIS_HOST: ${REDIS_HOST:-redis-db}
      REDIS_PORT: ${REDIS_PORT:-6379}
      GATEWAY_INTERNAL_TOKEN: ${GATEWAY_INTERNAL_TOKEN:-_nQKkw93nTQdu4ZiCEOy8eg_UJmHd0CfbCJ2thy4hx4}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-xazQ9fTOSl_oSBtJHqwDm93f0AwrPkRZ4neR_S6R_2M}
    volumes:
      - ./backend/catalog-service:/app
      - /app/node_modules
      - ./frontend/uploads/products:/app/uploads/products
    command: npm run dev
    depends_on:
      mysql-db:
        condition: service_healthy
      redis-db:
        condition: service_healthy
    restart: unless-stopped

  order-service:
    build: ./backend/order-service
    container_name: minhgiang_order
    environment:
      PORT: 8003
      NODE_ENV: development
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: root
      DB_NAME: mg_order
      CATALOG_SERVICE_URL: http://minhgiang_catalog:8002
      IDENTITY_SERVICE_URL: http://minhgiang_identity:8001
      GATEWAY_INTERNAL_TOKEN: ${GATEWAY_INTERNAL_TOKEN:-_nQKkw93nTQdu4ZiCEOy8eg_UJmHd0CfbCJ2thy4hx4}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-xazQ9fTOSl_oSBtJHqwDm93f0AwrPkRZ4neR_S6R_2M}
    volumes:
      - ./backend/order-service:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      mysql-db:
        condition: service_healthy
    restart: unless-stopped

  cms-service:
    build: ./backend/cms-service
    container_name: minhgiang_cms
    environment:
      PORT: 8004
      NODE_ENV: development
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: root
      DB_NAME: mg_cms
      GATEWAY_INTERNAL_TOKEN: ${GATEWAY_INTERNAL_TOKEN:-_nQKkw93nTQdu4ZiCEOy8eg_UJmHd0CfbCJ2thy4hx4}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-xazQ9fTOSl_oSBtJHqwDm93f0AwrPkRZ4neR_S6R_2M}
    volumes:
      - ./backend/cms-service:/app
      - /app/node_modules
      - ./frontend/uploads/cms:/app/uploads/cms
    command: npm run dev
    depends_on:
      mysql-db:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build: ./backend/notification-service
    container_name: minhgiang_notification
    environment:
      PORT: 8005
      NODE_ENV: development
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: root
      DB_NAME: mg_notification
      GATEWAY_INTERNAL_TOKEN: ${GATEWAY_INTERNAL_TOKEN:-_nQKkw93nTQdu4ZiCEOy8eg_UJmHd0CfbCJ2thy4hx4}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-xazQ9fTOSl_oSBtJHqwDm93f0AwrPkRZ4neR_S6R_2M}
      EMAIL_PROVIDER: smtp
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_NAME: Minh Giang Pharmacy
      EMAIL_FROM: ${EMAIL_FROM:-Minh Giang Pharmacy <noreply@minhgiangpharma.vn>}
      SMS_PROVIDER: ${SMS_PROVIDER:-generic_http}
      SMS_BRAND_NAME: ${SMS_BRAND_NAME:-MinhGiang}
      SMS_API_URL: ${SMS_API_URL:-}
      SMS_API_KEY: ${SMS_API_KEY:-}
      SMS_API_KEY_HEADER: ${SMS_API_KEY_HEADER:-Authorization}
      SMS_API_KEY_PREFIX: ${SMS_API_KEY_PREFIX:-Bearer}
      SMS_TO_FIELD: ${SMS_TO_FIELD:-to}
      SMS_MESSAGE_FIELD: ${SMS_MESSAGE_FIELD:-message}
      SMS_BRAND_FIELD: ${SMS_BRAND_FIELD:-brand_name}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM: ${TWILIO_FROM:-}
    volumes:
      - ./backend/notification-service:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      mysql-db:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────── API Gateway ──────────────────────────────
  api-gateway:
    build: ./backend/api-gateway
    container_name: minhgiang_gateway
    ports:
      - "8000:8000"   # Tất cả request đi qua đây: http://localhost:8000/api/...
    environment:
      PORT: 8000
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-23668e27c1340b01c3de8ff3ad40a5a0}
      IDENTITY_SERVICE_URL: http://identity-service:8001
      CATALOG_SERVICE_URL: http://catalog-service:8002
      ORDER_SERVICE_URL: http://order-service:8003
      CMS_SERVICE_URL: http://cms-service:8004
      NOTIFICATION_SERVICE_URL: http://notification-service:8005
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5500,http://localhost:3000}
      GATEWAY_INTERNAL_TOKEN: ${GATEWAY_INTERNAL_TOKEN:-_nQKkw93nTQdu4ZiCEOy8eg_UJmHd0CfbCJ2thy4hx4}
    volumes:
      - ./backend/api-gateway:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - identity-service
      - catalog-service
      - order-service
      - cms-service
      - notification-service
    restart: unless-stopped

volumes:
  db-data:
